<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Form</title>
</head>
<body>

    <h2>Enter User Details</h2>

    <form id="userForm">
        <input type="text" id="name" placeholder="Enter Name" required /><br><br>
        <input type="email" id="email" placeholder="Enter Email" required /><br><br>
        <input type="number" id="age" placeholder="Enter Age" required /><br><br>

        <button type="submit">Submit</button>
    </form>

    <p id="responseMsg"></p>

    <hr>

    <h3>Users List</h3>
    <ul id="userList"></ul>

    <script>
        const form = document.getElementById("userForm");

        // 🔹 Submit Form
        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const userData = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                age: parseInt(document.getElementById("age").value)
            };

            try {
                const res = await fetch("http://localhost:3000/add-user", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(userData)
                });

                const data = await res.json();

                document.getElementById("responseMsg").innerText = data.message;

                // 🔥 Refresh users list after adding
                loadUsers();

                // 🔥 Clear form
                form.reset();

            } catch (err) {
                console.error(err);
                document.getElementById("responseMsg").innerText = "Error submitting form";
            }
        });

        // 🔹 Load Users
        async function loadUsers() {
            try {
                const res = await fetch("http://localhost:3000/users");
                const data = await res.json();

                const list = document.getElementById("userList");
                list.innerHTML = "";

                if (data.data.length === 0) {
                    list.innerHTML = "<li>No users found</li>";
                    return;
                }

                data.data.forEach(user => {
                    const li = document.createElement("li");
                    li.innerText = `${user.name} - ${user.email} - ${user.age}`;
                    list.appendChild(li);
                });

            } catch (err) {
                console.error("Error loading users:", err);
            }
        }

        // 🔥 Load users when page opens
        loadUsers();
    </script>

</body>
</html>
